<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morning Secretary</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root,[data-theme="sakura"]{
--bg:#FAF6F2;--card:#FFFDF9;--text:#3E3229;--sub:#9B8E82;
--accent:#C4727F;--accent-light:#F8E8EB;--accent-dark:#96424F;
--green:#7A9033;--green-light:#EEF2E1;--green-dark:#5A6D22;
--blue:#1F4E8C;--blue-light:#E4EBF4;
--warm:#C07847;--warm-light:#F5EBE3;
--indigo:#1F4E8C;--indigo-light:#E4EBF4;
--border:rgba(62,50,41,0.07);--radius:14px;
--paper:#F5F0E8;
}
[data-theme="sumi"]{
--bg:#1C1C1E;--card:#2C2C2E;--text:#E8E4DF;--sub:#8A847C;
--accent:#D4A574;--accent-light:rgba(212,165,116,0.12);--accent-dark:#B8894E;
--green:#8BA86A;--green-light:rgba(139,168,106,0.12);--green-dark:#6E8A4E;
--blue:#6AABD2;--blue-light:rgba(106,171,210,0.12);
--warm:#D4845A;--warm-light:rgba(212,132,90,0.12);
--indigo:#6AABD2;--indigo-light:rgba(106,171,210,0.12);
--border:rgba(255,255,255,0.06);--radius:14px;
--paper:#2C2C2E;
}
[data-theme="matcha"]{
--bg:#F4F1EC;--card:#FAFAF7;--text:#2C3325;--sub:#7A8270;
--accent:#6B7F3A;--accent-light:#EDF1E3;--accent-dark:#4E5E28;
--green:#6B7F3A;--green-light:#EDF1E3;--green-dark:#4E5E28;
--blue:#4A7A8C;--blue-light:#E2EEF1;
--warm:#A67C52;--warm-light:#F2EBE3;
--indigo:#4A7A8C;--indigo-light:#E2EEF1;
--border:rgba(44,51,37,0.07);--radius:14px;
--paper:#EDE8DF;
}
[data-theme="ai"]{
--bg:#F0F2F5;--card:#FFFFFF;--text:#1A1A2E;--sub:#6B7280;
--accent:#1F4E8C;--accent-light:#DBEAFE;--accent-dark:#163B6B;
--green:#059669;--green-light:#D1FAE5;--green-dark:#047857;
--blue:#1F4E8C;--blue-light:#DBEAFE;
--warm:#DC6B2F;--warm-light:#FDE8D8;
--indigo:#4338CA;--indigo-light:#E0E7FF;
--border:rgba(0,0,0,0.06);--radius:14px;
--paper:#E8ECF1;
}
[data-theme="fuji"]{
--bg:#F5F0F6;--card:#FDFBFE;--text:#2E2438;--sub:#8A7E94;
--accent:#7B5EA7;--accent-light:#EDE7F3;--accent-dark:#5C4280;
--green:#6B8C5A;--green-light:#E8F0E4;--green-dark:#4E6B40;
--blue:#5A7B9E;--blue-light:#E2ECF3;
--warm:#B07A4F;--warm-light:#F3EAE1;
--indigo:#7B5EA7;--indigo-light:#EDE7F3;
--border:rgba(46,36,56,0.07);--radius:14px;
--paper:#ECE6EF;
}

body{font-family:'Zen Maru Gothic','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;transition:all 0.4s}
.container{max-width:460px;margin:0 auto;padding:16px}

/* Header */
.header{text-align:center;padding:32px 16px 20px;position:relative}
.greeting{font-family:'Playfair Display',serif;font-size:30px;font-style:italic;color:var(--text)}
.date-line{font-size:12px;color:var(--sub);letter-spacing:0.5px;margin-top:6px}
.time-big{font-size:56px;font-weight:300;color:var(--accent);margin:8px 0;letter-spacing:-3px}

/* Countdown */
.countdown{
display:inline-flex;align-items:center;gap:8px;
padding:8px 18px;border-radius:24px;
background:var(--accent-light);color:var(--accent-dark);
font-size:13px;font-weight:500;margin-top:4px;
}
.countdown.urgent{background:var(--warm-light);color:var(--warm)}

/* Play */
.play-btn{
display:flex;align-items:center;justify-content:center;gap:10px;
margin:20px auto 0;padding:13px 32px;
background:var(--accent);color:#fff;border:none;border-radius:32px;
font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;
transition:all 0.3s;box-shadow:0 3px 16px rgba(0,0,0,0.1);
}
.play-btn:hover{transform:translateY(-1px)}
.play-btn:active{transform:scale(0.97)}
.play-btn.playing{background:var(--warm)}
.play-btn svg{width:18px;height:18px;fill:currentColor}

/* Section */
.section{margin-top:24px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.section-label{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub)}
.section-badge{font-size:10px;padding:3px 10px;border-radius:12px;background:var(--green-light);color:var(--green-dark)}

/* Card */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:10px;transition:all 0.3s}

/* Weather */
.weather-top{display:flex;align-items:center;gap:14px}
.weather-icon{font-size:44px;line-height:1}
.weather-temp{font-size:40px;font-weight:300;letter-spacing:-2px}
.weather-desc{font-size:13px;color:var(--sub);margin-top:1px}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.weather-stat{text-align:center}
.weather-stat-val{font-size:14px;font-weight:500}
.weather-stat-lbl{font-size:10px;color:var(--sub);margin-top:1px}
.weather-tip{margin-top:14px;padding:10px 14px;border-radius:10px;background:var(--accent-light);color:var(--accent-dark);font-size:12px;line-height:1.7}
.pollen-bar{margin-top:10px;padding:10px 14px;border-radius:10px;background:var(--warm-light);color:var(--warm);font-size:12px;line-height:1.6}

/* Weekly weather */
.week-row{display:flex;justify-content:space-between;padding:0 4px}
.week-day{text-align:center;flex:1}
.week-day-name{font-size:10px;color:var(--sub)}
.week-day-icon{font-size:20px;margin:4px 0}
.week-day-temp{font-size:11px;font-weight:500}

/* Transit */
.direction-toggle{
display:flex;background:var(--paper);border-radius:10px;padding:3px;margin-bottom:14px;
}
.dir-btn{
flex:1;padding:8px;text-align:center;border-radius:8px;border:none;
font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;
background:transparent;color:var(--sub);
}
.dir-btn.active{background:var(--card);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.transit-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.transit-item:last-child{border-bottom:none}
.t-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;min-width:32px}
.t-train{background:var(--blue-light);color:var(--blue)}
.t-lr{background:var(--indigo-light);color:var(--indigo)}
.t-bus{background:var(--warm-light);color:var(--warm)}
.t-walk{background:var(--paper);color:var(--sub)}
.t-info{flex:1}
.t-name{font-size:13px;font-weight:500}
.t-status{font-size:11px;margin-top:1px}
.t-ok{color:var(--green)}
.t-delay{color:var(--warm)}
.t-time{font-size:12px;color:var(--sub)}
.transit-summary{padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.6;margin-top:10px}
.ts-ok{background:var(--green-light);color:var(--green-dark)}
.ts-delay{background:var(--warm-light);color:var(--warm)}
.transit-src{font-size:10px;color:var(--sub);text-align:center;margin-top:8px;font-style:italic}

/* Events */
.event-item{padding:14px 0;border-bottom:1px solid var(--border)}
.event-item:last-child{border-bottom:none}
.event-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;letter-spacing:0.3px;margin-bottom:6px}
.et-fest{background:#FAEEDA;color:#854F0B}
.et-music{background:var(--indigo-light);color:var(--indigo)}
.et-food{background:var(--warm-light);color:var(--warm)}
.et-outdoor{background:var(--green-light);color:var(--green-dark)}
.et-market{background:var(--blue-light);color:var(--blue)}
.event-name{font-size:14px;font-weight:500;margin-bottom:3px}
.event-meta{font-size:11px;color:var(--sub)}
.event-src{font-size:10px;color:var(--sub);margin-top:6px;font-style:italic}

/* Script */
.script-box{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;padding:4px 0}
.script-loading{color:var(--sub);font-style:italic;font-size:13px}

/* Settings */
.settings-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:100;display:none;align-items:flex-end;justify-content:center}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:460px;max-height:82vh;overflow-y:auto;padding:20px 18px 36px}
.settings-handle{width:36px;height:4px;background:var(--sub);opacity:0.25;border-radius:2px;margin:0 auto 18px}
.settings-title{font-size:16px;font-weight:500;margin-bottom:20px}
.sg{margin-bottom:18px}
.sg-label{font-size:12px;font-weight:500;color:var(--sub);margin-bottom:6px}
.sg-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;background:var(--card);color:var(--text);outline:none}
.sg-input:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:16px;font-size:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;user-select:none;color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-row{display:flex;gap:10px;justify-content:center}
.theme-opt{text-align:center;cursor:pointer}
.theme-circle{width:38px;height:38px;border-radius:50%;border:3px solid transparent;margin:0 auto 4px;transition:all 0.2s}
.theme-circle.active{border-color:var(--accent);transform:scale(1.1)}
.theme-name{font-size:9px;color:var(--sub)}
.save-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:20px}

/* Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:center;gap:56px;padding:10px 0 26px;z-index:50;transition:all 0.3s}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--sub);font-family:inherit}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;fill:currentColor}

.fade{animation:fadeUp .5s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.fade:nth-child(2){animation-delay:.1s}
.fade:nth-child(3){animation-delay:.2s}
.fade:nth-child(4){animation-delay:.3s}
.fade:nth-child(5){animation-delay:.4s}
.fade:nth-child(6){animation-delay:.5s}

.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body data-theme="sakura">

</div>

<div class="bottom-nav">
  <button class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span>Brief</span></button>
  <button class="nav-btn" onclick="openSettings()"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg><span>Settings</span></button>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">

      <div class="sg-label">Interests</div>

        <div class="chip" onclick="this.classList.toggle('active')">Family</div>
        <div class="chip" onclick="this.classList.toggle('active')">Sports</div>
        <div class="chip active" onclick="this.classList.toggle('active')">Markets</div>

        <div class="theme-opt" onclick="setTheme('matcha',this)"><div class="theme-circle" style="background:linear-gradient(135deg,#6B7F3A,#EDF1E3)"></div><div class="theme-name">Matcha</div></div>
        <div class="theme-opt" onclick="setTheme('fuji',this)"><div class="theme-circle" style="background:linear-gradient(135deg,#7B5EA7,#EDE7F3)"></div><div class="theme-name">Fuji</div></div>
        <div class="theme-opt" onclick="setTheme('ai',this)"><div class="theme-circle" style="background:linear-gradient(135deg,#1F4E8C,#DBEAFE)"></div><div class="theme-name">Indigo</div></div>
        <div class="theme-opt" onclick="setTheme('sumi',this)"><div class="theme-circle" style="background:linear-gradient(135deg,#D4A574,#1C1C1E)"></div><div class="theme-name">Sumi ink</div></div>
      </div>

</div>

<script>
const WORKER = 'https://tfnsw-proxy.m9djxmy7nf.workers.dev';
let W = null; // weather data
let T = null; // transit data
let DIR = 'auto';
let VOICE_LANG = 'en-AU';
let WORK_TIME = 9;

// ===== TIME =====
function updateTime(){
  const n = new Date();
  const h = n.getHours(), m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('timeDisplay').textContent = `${h}:${m}`;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateLine').textContent = `${days[n.getDay()]}, ${n.getDate()} ${mons[n.getMonth()]} ${n.getFullYear()}`;
  if(h<12) document.getElementById('greeting').textContent='Good morning';
  else if(h<18) document.getElementById('greeting').textContent='Good afternoon';
  else document.getElementById('greeting').textContent='Good evening';
  updateCountdown();
  autoDirection();
}

function updateCountdown(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes();
  const el=document.getElementById('countdown');
  if(h>=WORK_TIME||h<5){el.style.display='none';return}
  const commute=55;
  const leaveH=WORK_TIME, leaveM=0-commute;
  let targetMin=WORK_TIME*60-commute;
  const nowMin=h*60+m;
  const diff=targetMin-nowMin;
  if(diff<=0||diff>180){el.style.display='none';return}
  el.style.display='inline-flex';
  if(diff<=15){el.className='countdown urgent';el.textContent=`Leave in ${diff} min!`}
  else{el.className='countdown';el.textContent=`${diff} min until you should leave`}
}

function autoDirection(){
  if(DIR!=='auto')return;
  const h=new Date().getHours();
  if(h<13){
    document.getElementById('dirWork').classList.add('active');
    document.getElementById('dirHome').classList.remove('active');
  } else {
    document.getElementById('dirHome').classList.add('active');
    document.getElementById('dirWork').classList.remove('active');
  }
}

updateTime();
setInterval(updateTime,30000);

function setDir(d){
  DIR=d;
  document.getElementById('dirWork').classList.toggle('active',d==='to_work');
  document.getElementById('dirHome').classList.toggle('active',d==='to_home');
  loadTransit(d);
}

// ===== WEATHER =====
async function loadWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-33.8151&longitude=151.0017&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,weather_code&timezone=Australia%2FSydney&forecast_days=7');
    const d=await r.json();
    W={c:d.current,d:d.daily};
    renderWeather();
    renderWeek();
    loadPollen();
  }catch(e){document.getElementById('weatherCard').innerHTML='<p style="color:var(--sub);font-size:13px">Unable to load weather</p>'}
}

function wIcon(c){if(c<=1)return'\u2600\uFE0F';if(c<=3)return'\u26C5';if(c<=48)return'\u2601\uFE0F';if(c<=57)return'\uD83C\uDF26';if(c<=67)return'\uD83C\uDF27';if(c<=77)return'\uD83C\uDF28';if(c<=82)return'\uD83C\uDF27';if(c>=95)return'\u26C8';return'\uD83C\uDF24'}
function wDesc(c){if(c<=1)return'Clear';if(c===2)return'Partly cloudy';if(c===3)return'Overcast';if(c<=48)return'Fog';if(c<=57)return'Drizzle';if(c<=67)return'Rain';if(c<=77)return'Snow';if(c<=82)return'Showers';if(c>=95)return'Thunderstorm';return'Mostly clear'}

function clothingTip(t,r,uv){
  let a=[];
  if(t<=10)a.push('Bundle up — thick jacket and scarf');
  else if(t<=18)a.push('A bit cool, bring a jacket');
  else if(t<=25)a.push('Comfortable — light layers');
  else a.push('Warm day — dress light');
  if(r>50)a.push('Grab an umbrella, high chance of rain');
  else if(r>30)a.push('Maybe toss an umbrella in your bag');
  if(uv>=8)a.push('UV is intense — sunscreen and hat essential');
  else if(uv>=5)a.push('Moderate UV — sunscreen recommended');
  return a.join('. ')+'.';
}

function renderWeather(){
  const c=W.c,d=W.d;
  const t=Math.round(c.temperature_2m),f=Math.round(c.apparent_temperature);
  const hi=Math.round(d.temperature_2m_max[0]),lo=Math.round(d.temperature_2m_min[0]);
  const rain=d.precipitation_probability_max[0],uv=Math.round(d.uv_index_max[0]);
  document.getElementById('weatherCard').innerHTML=`
    <div class="weather-top"><div class="weather-icon">${wIcon(c.weather_code)}</div><div><div class="weather-temp">${t}\u00B0</div><div class="weather-desc">${wDesc(c.weather_code)} \u00B7 Feels ${f}\u00B0</div></div></div>
    <div class="weather-grid">
      <div class="weather-stat"><div class="weather-stat-val">${lo}\u00B0/${hi}\u00B0</div><div class="weather-stat-lbl">Low/High</div></div>
      <div class="weather-stat"><div class="weather-stat-val">${rain}%</div><div class="weather-stat-lbl">Rain</div></div>
      <div class="weather-stat"><div class="weather-stat-val">UV ${uv}</div><div class="weather-stat-lbl">UV Index</div></div>
      <div class="weather-stat"><div class="weather-stat-val">${c.relative_humidity_2m}%</div><div class="weather-stat-lbl">Humidity</div></div>
    </div>
    <div class="weather-tip">${clothingTip(t,rain,uv)}</div>
    <div id="pollenInfo"></div>
  `;
}

function renderWeek(){
  const d=W.d;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h='';
  for(let i=1;i<Math.min(6,d.temperature_2m_max.length);i++){
    const dt=new Date(d.time?.[i]||Date.now()+i*86400000);
    h+=`<div class="week-day"><div class="week-day-name">${days[dt.getDay()]}</div><div class="week-day-icon">${wIcon(d.weather_code[i])}</div><div class="week-day-temp">${Math.round(d.temperature_2m_min[i])}\u00B0/${Math.round(d.temperature_2m_max[i])}\u00B0</div></div>`;
  }
  document.getElementById('weekRow').innerHTML=h;
  document.getElementById('weekSection').style.display='block';
}

async function loadPollen(){
  try{
    const r=await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=-33.8151&longitude=151.0017&current=grass_pollen,birch_pollen,alder_pollen&timezone=Australia%2FSydney');
    const d=await r.json();
    const grass=d.current?.grass_pollen||0;
    const birch=d.current?.birch_pollen||0;
    const total=grass+birch;
    if(total>10){
      document.getElementById('pollenBadge').style.display='inline';
      let level='Low',emoji='\uD83C\uDF3F';
      if(total>50){level='High';emoji='\u26A0\uFE0F'}
      else if(total>20){level='Moderate';emoji='\uD83C\uDF3E'}
      const el=document.getElementById('pollenInfo');
      if(el)el.innerHTML=`<div class="pollen-bar">${emoji} Pollen: ${level} (Grass: ${Math.round(grass)}, Tree: ${Math.round(birch)}). ${total>30?'Allergy sufferers should take precautions.':'Mild levels today.'}</div>`;
    }
    window.pollenLevel=total>50?'high':total>20?'moderate':'low';
  }catch(e){window.pollenLevel='unknown'}
}

loadWeather();

// ===== TRANSIT =====
async function loadTransit(direction){
  const d=direction||(new Date().getHours()<13?'to_work':'to_home');
  const el=document.getElementById('transitContent');
  el.innerHTML='<span class="script-loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  try{
    const r=await fetch(`${WORKER}/trip?direction=${d}`);
    const data=await r.json();
    if(data.journeys&&data.journeys.length>0){
      T=data;renderTransit(data,d);
    }else{
      el.innerHTML=`<p style="font-size:13px;color:var(--sub)">No trips found. ${data.systemMessages?data.systemMessages.map(m=>m.text).join(', '):''}</p>`;
      T=null;
    }
  }catch(e){el.innerHTML='<p style="font-size:13px;color:var(--sub)">Could not connect to transit service</p>';T=null}
  generateScript();
}

function renderTransit(data,dir){
  const j=data.journeys[0];
  let html='',totalMin=0,hasDelay=false,legs=[];
  j.legs.forEach(leg=>{
    const tp=leg.transportation;
    const isWalk=!tp||tp.product?.class===100;
    const dur=Math.round((leg.duration||0)/60);
    if(dur<1&&isWalk)return;
    totalMin+=dur;
    if(isWalk){
      html+=`<div class="transit-item"><span class="t-badge t-walk">Walk</span><div class="t-info"><div class="t-name">${leg.origin?.disassembledName||leg.origin?.name||''}</div><div class="t-status t-ok">to ${leg.destination?.disassembledName||leg.destination?.name||''}</div></div><div class="t-time">${dur} min</div></div>`;
      legs.push({mode:'walk',dur});
      return;
    }
    const pName=tp.product?.name||'';
    const lineNum=tp.disassembledName||tp.number||'';
    let badge=lineNum,cls='t-train';
    if(pName.includes('Light Rail')||tp.product?.class===4){cls='t-lr'}
    else if(pName.includes('Bus')||tp.product?.class===5||tp.product?.class===7){cls='t-bus'}
    const planned=leg.origin?.departureTimePlanned;
    const estimated=leg.origin?.departureTimeEstimated;
    let delayMin=0;
    if(planned&&estimated)delayMin=Math.round((new Date(estimated)-new Date(planned))/60000);
    if(delayMin>2)hasDelay=true;
    const statusTxt=delayMin>2?`Delayed ~${delayMin} min`:'On time';
    const statusCls=delayMin>2?'t-delay':'t-ok';
    const from=leg.origin?.parent?.disassembledName||leg.origin?.disassembledName||'';
    const to=leg.destination?.parent?.disassembledName||leg.destination?.disassembledName||'';
    html+=`<div class="transit-item"><span class="t-badge ${cls}">${badge}</span><div class="t-info"><div class="t-name">${from} \u2192 ${to}</div><div class="t-status ${statusCls}">${statusTxt}</div></div><div class="t-time">${dur} min</div></div>`;
    legs.push({mode:lineNum,from,to,delay:delayMin,dur});
  });
  document.getElementById('transitContent').innerHTML=html+(hasDelay
    ?`<div class="transit-summary ts-delay">\u26A0\uFE0F Delays on your route. Total ~${totalMin} min.</div>`
    :`<div class="transit-summary ts-ok">\u2705 All services on time. Total ~${totalMin} min.</div>`);
  document.getElementById('transitBadge').textContent='Live';
  window.transitInfo={totalMin,hasDelay,legs,dir};
}

loadTransit();

// ===== SWAGGER SCRIPT GENERATOR =====
function generateScript(){
  const s=buildSwaggerScript();
  window.briefScript=s;
  document.getElementById('scriptBox').textContent=s;
}

function buildSwaggerScript(){
  const h=new Date().getHours();
  const greets_m=["Morning, legend.","Rise and shine.","Hey, good morning.","Top of the morning.","Alright, let's do this.","Morning. Coffee first, then we talk.","Hey there. Ready for today?","G'day. Let's get you sorted.","Wakey wakey.","Good morning, superstar."];
  const greets_a=["Afternoon.","Hey, good arvo.","Well well, afternoon check-in."];
  const greets_e=["Evening.","Hey, winding down?","Night owl mode, I see."];
  let g;
  if(h<12)g=pick(greets_m);else if(h<18)g=pick(greets_a);else g=pick(greets_e);

  let weather='';
  if(W){
    const t=Math.round(W.c.temperature_2m),f=Math.round(W.c.apparent_temperature);
    const hi=Math.round(W.d.temperature_2m_max[0]),lo=Math.round(W.d.temperature_2m_min[0]);
    const rain=W.d.precipitation_probability_max[0],uv=Math.round(W.d.uv_index_max[0]);
    const desc=wDesc(W.c.weather_code).toLowerCase();

    const tempPhrases=[
      `It's ${t} degrees out, feels more like ${f}.`,
      `Currently sitting at ${t}, but your skin's gonna feel ${f}.`,
      `${t} degrees right now. Feels like ${f} though.`,
      `Thermometer says ${t}, your body says ${f}.`,
    ];

    const descPhrases=[
      `${capitalize(desc)} kind of day.`,
      `Looking ${desc} out there.`,
      `Skies are ${desc}.`,
    ];

    const rangePhrases=[
      `Hitting ${hi} later, dropping to ${lo} tonight.`,
      `Expect a high of ${hi} and low of ${lo}.`,
      `Peaks at ${hi}, bottoms out at ${lo}.`,
    ];

    weather=pick(tempPhrases)+' '+pick(descPhrases)+' '+pick(rangePhrases);

    if(rain>50){
      weather+=pick([` Definitely grab an umbrella.`,` Rain's coming \u2014 umbrella's non-negotiable.`,` You'll want that umbrella, trust me.`,` It's gonna be wet, pack accordingly.`]);
    }else if(rain>25){
      weather+=pick([` Might drizzle, maybe chuck an umbrella in the bag.`,` Slight chance of rain \u2014 umbrella just in case.`,` Could get a sprinkle. Your call on the umbrella.`]);
    }else{
      weather+=pick([` No rain on the radar.`,` Dry day ahead.`,` Looking dry, we're good.`]);
    }

    if(uv>=8)weather+=pick([` UV's brutal today \u2014 sunscreen up.`,` Slip slop slap, mate. UV is no joke.`]);
    else if(uv>=5)weather+=pick([` UV's moderate, sunscreen's a good idea.`,` Worth putting on some sunscreen.`]);

    if(window.pollenLevel==='high')weather+=pick([` Heads up \u2014 pollen is high today. Antihistamines might be your friend.`,` Pollen's going crazy today. Allergy crew, you've been warned.`]);
    else if(window.pollenLevel==='moderate')weather+=pick([` Pollen's moderate \u2014 shouldn't be too bad.`,` Bit of pollen in the air, nothing wild.`]);
  }

  let transit='';
  if(window.transitInfo){
    const ti=window.transitInfo;
    if(ti.hasDelay){
      const delayLegs=ti.legs.filter(l=>l.delay>2);
      const delayTxt=delayLegs.map(l=>`${l.mode} is delayed about ${l.delay} minutes`).join(' and ');
      transit+=pick([
        `Commute update \u2014 ${delayTxt}. Total trip looking like ${ti.totalMin} minutes.`,
        `So, heads up on the commute. ${delayTxt}. Budget about ${ti.totalMin} minutes.`,
        `Transport's being a bit annoying today. ${delayTxt}. Looking at ~${ti.totalMin} minutes total.`,
        `Right, transit news \u2014 ${delayTxt}. You're looking at ${ti.totalMin} minutes door to door.`,
      ]);
      transit+=pick([` Maybe leave a bit earlier.`,` Factor that in.`,` Plan accordingly.`]);
    }else{
      transit+=pick([
        `Commute's looking clean \u2014 about ${ti.totalMin} minutes, no dramas.`,
        `All trains and trams running on time. About ${ti.totalMin} minutes.`,
        `Transport's behaving today. ~${ti.totalMin} minutes, smooth sailing.`,
        `Good news \u2014 everything's running on schedule. ${ti.totalMin} minutes.`,
        `No delays, no stress. ${ti.totalMin} minutes and you're there.`,
      ]);
    }
  }

  let events='';
  if(window.eventsBrief){
    const dayOfWeek=new Date().getDay();
    if(dayOfWeek>=4){
      events+=pick([
        `\n\nWeekend's almost here \u2014 check out ${window.eventsBrief}.`,
        `\n\nFor the weekend: ${window.eventsBrief}. Could be a vibe.`,
        `\n\nWeekend plans? ${window.eventsBrief}. Just saying.`,
      ]);
    }
  }

  const closers=[
    `\n\nHave a good one.`,`\n\nYou got this.`,`\n\nGo get 'em.`,
    `\n\nMake it a good day.`,`\n\nAlright, that's your lot. Go crush it.`,
    `\n\nAnd that's the brief. Now go be brilliant.`,
    `\n\nThat's all from me. Stay cool.`,`\n\nOver and out.`,
    `\n\nRight, off you go. Make today count.`,
  ];

  return g+'\n\n'+weather+(transit?'\n\n'+transit:'')+events+pick(closers);
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

// ===== TTS =====
let isSpeaking=false;
function toggleBrief(){
  if(isSpeaking){speechSynthesis.cancel();isSpeaking=false;updatePlayUI(false);return}
  const script=window.briefScript||'Brief is loading...';
  isSpeaking=true;updatePlayUI(true);
  const u=new SpeechSynthesisUtterance(script);
  u.lang=VOICE_LANG;u.rate=0.93;u.pitch=0.92;
  const voices=speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang===VOICE_LANG)||voices.find(v=>v.lang.startsWith(VOICE_LANG.split('-')[0]))||voices[0];
  if(v)u.voice=v;
  u.onend=()=>{isSpeaking=false;updatePlayUI(false)};
  speechSynthesis.speak(u);
}
function updatePlayUI(p){
  const btn=document.getElementById('playBtn'),lbl=document.getElementById('playLabel');
  if(p){btn.classList.add('playing');lbl.textContent='Stop';btn.querySelector('svg').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';}
  else{btn.classList.remove('playing');lbl.textContent='Play brief';btn.querySelector('svg').innerHTML='<polygon points="5,3 19,12 5,21"/>';}
}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
