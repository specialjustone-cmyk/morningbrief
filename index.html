function fT(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'Australia/Sydney'})}
// Count intermediate stops between Parramatta and Central
function countIntermediateStops(leg) {
  if (!leg.stopSequence) return 0;
  // stopSequence includes origin and destination, so intermediate = length - 2
  return Math.max(0, leg.stopSequence.length - 2);
}
async function lT(dir){
  const d=dir||(new Date().getHours()<13?'to_work':'to_home');
  document.getElementById('TC').innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  document.getElementById('NX').innerHTML='';

  try{
    const r=await fetch(K+'/trip?direction='+d+'&_='+Date.now());
    const data=await r.json();
    if(data.journeys?.length>0)rT(data);
    else{document.getElementById('TC').innerHTML='<p style="font-size:13px;color:var(--sub)">No trips found</p>';TI=null}
  }catch(e){document.getElementById('TC').innerHTML='<p style="font-size:13px;color:var(--sub)">Could not connect</p>';TI=null}

}

function rT(data){
  const j=data.journeys[0];let h='',tot=0,dl=false,legs=[];
  j.legs.forEach(l=>{
    const tp=l.transportation,isW=!tp||tp.product?.class===100,dur=Math.round((l.duration||0)/60);
    if(dur<1&&isW)return;tot+=dur;
    if(isW){h+='<div class="ti"><span class="tb tb4">Walk</span><div class="tf"><div class="tn">'+(l.origin?.disassembledName||'')+'</div><div class="ts tok">to '+(l.destination?.disassembledName||'')+'</div></div><div class="tt">'+dur+'m</div></div>';legs.push({m:'walk',dur});return}
    const ln=tp.disassembledName||tp.number||'',pn=tp.product?.name||'';
    let c='tb1',mode='train';
    if(pn.includes('Light Rail')||tp.product?.class===4){c='tb2';mode='lr'}
    else if(pn.includes('Bus')||tp.product?.class===5||tp.product?.class===7){c='tb3';mode='bus'}
    let dm=0;const pld=l.origin?.departureTimePlanned,est=l.origin?.departureTimeEstimated;
    if(pld&&est)dm=Math.round((new Date(est)-new Date(pld))/6e4);if(dm>2)dl=true;
    const depTime=fT(est||pld);
    const plat=l.origin?.properties?.platformName||'';
    const fr=l.origin?.parent?.disassembledName||l.origin?.disassembledName||'';
    const to=l.destination?.parent?.disassembledName||l.destination?.disassembledName||'';
    // Determine train type: intermediate stops between origin and destination
    let stype='',stcls='';
    if(mode==='train'){
      const intStops=countIntermediateStops(l);
      if(intStops<=4){stype='Limited stops';stcls='stype-exp'}
      else{stype='All stops';stcls='stype-all'}
    }
    h+='<div class="ti"><span class="tb '+c+'">'+ln+'</span><div class="tf"><div class="tn">'+fr+' \u2192 '+to+(stype?'<span class="stype '+stcls+'">'+stype+'</span>':'')+'</div><div class="ts '+(dm>2?'tdl':'tok')+'">'+(dm>2?'Delayed ~'+dm+'m':'On time')+'</div></div><div class="tt"><div class="tt-dep">'+depTime+'</div>'+(plat?'<div class="tt-plat">'+plat+'</div>':'')+'</div></div>';
    legs.push({m:ln,mode,fr,to,dm,dur,dep:depTime,plat,stype});
  });
  document.getElementById('TC').innerHTML=h+(dl?'<div class="tsum tsdl">\u26A0\uFE0F Delays. ~'+tot+' min.</div>':'<div class="tsum tsok">\u2705 All on time. ~'+tot+' min.</div>');

  // Collect next departures per mode
  const nextByMode={train:[],lr:[],bus:[]};
  data.journeys.slice(1).forEach(j2=>{
    j2.legs.forEach(l=>{
      const tp=l.transportation;if(!tp||tp.product?.class===100)return;
      const pn=tp.product?.name||'';let mode='train';
      if(pn.includes('Light Rail')||tp.product?.class===4)mode='lr';
      else if(pn.includes('Bus')||tp.product?.class===5||tp.product?.class===7)mode='bus';
      const t=fT(l.origin?.departureTimeEstimated||l.origin?.departureTimePlanned);
      if(!t)return;
      let st='';if(mode==='train'){const is=countIntermediateStops(l);st=is<=4?' (limited)':' (all stops)'}
      // Only add if not duplicate and reasonable count
      if(nextByMode[mode].length<2&&!nextByMode[mode].find(x=>x.startsWith(t))){
        nextByMode[mode].push(t+st);
      }
    });
  });
  let nxH='';
  if(nextByMode.train.length)nxH+='<div><span class="tnxt-lbl">Next trains:</span>'+nextByMode.train.join(' \u00B7 ')+'</div>';
  if(nextByMode.lr.length)nxH+='<div style="margin-top:4px"><span class="tnxt-lbl">Next light rail:</span>'+nextByMode.lr.join(' \u00B7 ')+'</div>';
  if(nextByMode.bus.length)nxH+='<div style="margin-top:4px"><span class="tnxt-lbl">Next buses:</span>'+nextByMode.bus.join(' \u00B7 ')+'</div>';
  if(nxH)document.getElementById('NX').innerHTML='<div class="tnxt">'+nxH+'</div>';

  TI={tot,dl,legs};
}

function fB(){const h=new Date().getHours();let s=(h<12?'Morning':h<18?'Afternoon':'Evening')+', '+UN+'. ';if(W){const t=Math.round(W.c.temperature_2m),f=Math.round(W.c.apparent_temperature),r=W.d.precipitation_probability_max[0];s+=t+'\u00B0, feels '+f+'\u00B0. '+(r>50?'Umbrella essential. ':r>25?'Might drizzle. ':'Dry day. ')}if(PD&&PD.tot>20)s+='Pollen '+(PD.tot>50?'high':'moderate')+'. ';if(TI)s+=TI.dl?'Delays, ~'+TI.tot+'min. ':'Clear commute, ~'+TI.tot+'min. ';s+=['Have a good one.','You got this.','Go crush it.'][Math.floor(Math.random()*3)];return s}
function showTip(){const tip=todayTip();document.getElementById('TIP').innerHTML='<div class="tip-box"><div class="tip-cat">'+tip.cat+'</div>'+tip.tip+'</div>'}
function capitalize(s){return (s||'').charAt(0).toUpperCase()+(s||'').slice(1)}

async function play(){if(pl){stp();return}if(!briefVoice&&!briefText)return;const b=document.getElementById('PB');if(acache){au=new Audio(acache);au.onended=()=>stp();au.play();pl=true;b.classList.add('on');document.getElementById('PL').textContent='Stop';document.getElementById('PI').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';return}b.classList.add('ld');document.getElementById('PL').textContent='Loading...';try{const r=await fetch(K+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:briefVoice||briefText,voice:VO})});if(!r.ok)throw 0;const bl=await r.blob(),u=URL.createObjectURL(bl);acache=u;au=new Audio(u);au.onended=()=>stp();au.play();pl=true;b.classList.remove('ld');b.classList.add('on');document.getElementById('PL').textContent='Stop';document.getElementById('PI').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'}catch(e){b.classList.remove('ld');fbTTS(briefVoice||briefText)}}
function fbTTS(t){const u=new SpeechSynthesisUtterance(t);u.lang='en-AU';u.rate=.93;u.pitch=.92;const v=speechSynthesis.getVoices(),vo=v.find(x=>x.lang==='en-AU')||v.find(x=>x.lang.startsWith('en'))||v[0];if(vo)u.voice=vo;u.onend=()=>stp();pl=true;document.getElementById('PB').classList.add('on');document.getElementById('PL').textContent='Stop';document.getElementById('PI').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';speechSynthesis.speak(u)}
function stp(){if(au){au.pause();au=null}speechSynthesis.cancel();pl=false;document.getElementById('PB').classList.remove('on','ld');document.getElementById('PL').textContent='Play brief';document.getElementById('PI').innerHTML='<polygon points="5,3 19,12 5,21"/>'}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

function oS(){document.getElementById('SO').classList.add('open');document.getElementById('iN').value=UN;document.getElementById('iW').value=String(WT).padStart(2,'0')+':00'}
function cS(e){if(e.target===document.getElementById('SO'))document.getElementById('SO').classList.remove('open')}
function sT(t,el){document.body.setAttribute('data-theme',t);document.querySelectorAll('.tc').forEach(c=>c.classList.remove('a'));el.querySelector('.tc').classList.add('a');ss({t})}
function sV(el,v){el.parentElement.querySelectorAll('.cp').forEach(c=>c.classList.remove('a'));el.classList.add('a');VO=v}
function svS(){UN=document.getElementById('iN').value||'Emma';WT=parseInt(document.getElementById('iW').value.split(':')[0])||9;ss({n:UN,wt:WT,v:VO,t:document.body.getAttribute('data-theme')});document.getElementById('SO').classList.remove('open');document.querySelector('.svb').textContent='\u2713 Saved';setTimeout(()=>document.querySelector('.svb').textContent='Save',1200);uT();reBrief()}
function ss(d){try{const c=JSON.parse(localStorage.getItem('ms9')||'{}');localStorage.setItem('ms9',JSON.stringify({...c,...d}))}catch(e){}}
